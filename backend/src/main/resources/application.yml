server:
  port: 8080

upload:
  path: F:/毕业设计/backend/uploads/

spring:
  application:
    name: news-platform-backend

  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/news_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.newsplatform: info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html


